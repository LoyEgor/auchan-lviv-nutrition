name: Scrape & Deploy

# Re-scrapes the Auchan Lviv catalog and publishes the static site to GitHub Pages.
# Runs weekly, on push to main, and on manual dispatch.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 */3 * *" # every 3rd day, 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Scrape catalog (fall back to committed snapshot on failure)
        run: npm run scrape || echo "scrape failed — deploying last committed snapshot"
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
