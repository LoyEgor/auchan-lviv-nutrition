<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Каталог за КБЖВ · Ашан і Сільпо (Львів)</title>
    <meta name="color-scheme" content="light dark" />

    <!-- Favicons: SVG scales to any size on modern browsers; PNG/ICO and the
         apple-touch-icon cover the rest, manifest icons cover Android/PWA. -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png" />
    <link rel="icon" sizes="48x48" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      // Key must match THEME_KEY in src/persist.ts; value is a raw "light"/"dark".
      (function () {
        try {
          var t = localStorage.getItem("food.theme.v1");
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
